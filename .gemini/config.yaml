# have_fun: 出力のカジュアル度。現場運用では false 推奨
have_fun: false

# 全体のコードレビュー設定（デフォルト）
code_review:
  disable: false
  # デフォルトしきい値（個別 path_overrides が無い場合に適用）
  comment_severity_threshold: MEDIUM  # LOW / MEDIUM / HIGH / CRITICAL
  max_review_comments: 25             # -1 = unlimited
  allow_summaries: true               # PRサマリを自動生成するか
  pull_request_opened:
    summary: true
    code_review: true
    help: false
  # 【追加】PRが更新されたときもレビューを実行し、継続的なフィードバックを得る
  pull_request_synchronized:
    summary: false # 更新時はサマリー不要
    code_review: true
    help: false

# パスごとの上書きルール
path_overrides:
  # フロントエンド全体：スタイルや型の細かい指摘を拾う
  "frontend/src/**":
    comment_severity_threshold: LOW
    max_review_comments: 40

  # フロントエンドのテスト：指摘を簡潔にする
  "frontend/src/**/*.test.{ts,tsx}":
    comment_severity_threshold: LOW
    max_review_comments: 10

  # バックエンドのソースコード：ロジックやセキュリティを重視
  "backend/src/**":
    comment_severity_threshold: MEDIUM
    max_review_comments: 25

  # バックエンドのスクリプト（seed等）：軽めの指摘
  "backend/src/scripts/**":
    comment_severity_threshold: LOW
    max_review_comments: 10

# レビュー対象外のパターン（AIのコンテキストから除外するファイル）
ignore_patterns:
  - "node_modules/**"
  - "frontend/.next/**"
  - "frontend/out/**"
  # 【修正】静的アセット(SVG, アイコン等)を除外
  - "frontend/public/**"
  - "backend/dist/**"
  - ".git/**"
  - "coverage/**"
  # 【追加】 .gitignore に倣い、不要なファイルを除外
  - "*.log"
  - "package-lock.json"
  - "pnpm-lock.yaml"
  - "yarn.lock"
  # 【追加】証明書や機密ファイル
  - ".env*"
  - "*.pem"
  - "*.key"
  - "*.p12"

# セーフティ設定
safety:
  redact_secrets: true
  allow_upload_of_large_binaries: fals