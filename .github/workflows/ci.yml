name: CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            ci:
              - '.github/workflows/**'

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: >
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'workflow_dispatch'
    env:
      CI: true
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
          run_install: false
      - name: Setup Node 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint frontend
        run: pnpm --filter frontend lint
      - name: Typecheck frontend
        run: pnpm --filter frontend run typecheck --if-present
      - name: Test frontend
        run: pnpm --filter frontend run test:ci --if-present
      - name: Build frontend
        run: pnpm --filter frontend build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: changes
    if: >
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.ci == 'true' ||
      github.event_name == 'workflow_dispatch'
    env:
      CI: true
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
          run_install: false
      - name: Setup Node 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint backend
        run: pnpm --filter backend run lint --if-present
      - name: Typecheck backend
        run: pnpm --filter backend run typecheck --if-present
      - name: Test backend
        run: pnpm --filter backend run test:ci --if-present
      - name: Build backend
        run: pnpm --filter backend build

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0
          run_install: false
      - name: Setup Node 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Audit frontend (prod deps)
        run: pnpm -C frontend audit --prod --audit-level high
      - name: Audit backend (prod deps)
        run: pnpm -C backend audit --prod --audit-level high
