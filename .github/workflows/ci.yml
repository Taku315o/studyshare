name: CI

on:
  pull_request:
  push:
    branches:
      - main
  # Weekly full audit. Keep enabled if you want scheduled security checks.
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            ci:
              - '.github/workflows/**'

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.ci == 'true'
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci --prefix frontend
      - name: Lint frontend
        run: npm run lint --prefix frontend
      - name: Typecheck frontend
        run: npm --prefix frontend run typecheck --if-present
      - name: Test frontend
        run: npm --prefix frontend run test:ci --if-present
      - name: Build frontend
        run: npm run build --prefix frontend

  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: changes
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.ci == 'true'
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci --prefix backend
      - name: Lint backend
        run: npm --prefix backend run lint --if-present
      - name: Typecheck backend
        run: npm --prefix backend run typecheck --if-present
      - name: Test backend
        run: npm --prefix backend run test:ci --if-present
      - name: Build backend
        run: npm run build --prefix backend

  audit:
    name: Security audit (main only)
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Audit frontend (prod deps)
        run: npm --prefix frontend audit --omit=dev --audit-level=high
      - name: Audit backend (prod deps)
        run: npm --prefix backend audit --omit=dev --audit-level=high
